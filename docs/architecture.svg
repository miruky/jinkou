<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" aria-label="jinkouのアーキテクチャ図">
  <title>jinkouのアーキテクチャ: 概数データからコーホート前進計算、補間、SVG描画までの流れ</title>
  <style>
    .box { fill: #ffffff; stroke: #c9ced6; rx: 10; }
    .zone { fill: #eff2f6; stroke: #dde2e9; rx: 14; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #1f242c; }
    .h { font-size: 14px; font-weight: 600; }
    .s { font-size: 11px; fill: #5c6571; }
    .zl { font-size: 11px; font-weight: 600; fill: #3d5a80; letter-spacing: 1px; }
    .arrow { stroke: #5c6571; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1c2026; stroke: #3a414b; }
      .zone { fill: #171b21; stroke: #2a3038; }
      .t { fill: #e7eaee; }
      .s { fill: #98a2ae; }
      .zl { fill: #7ea8d8; }
      .arrow { stroke: #98a2ae; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#5c6571"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="740" height="96"/>
  <text class="t zl" x="36" y="44">概数データ(src/lib/data.ts)</text>
  <rect class="box" x="36" y="56" width="220" height="44"/>
  <text class="t h" x="52" y="76">1950年の初期人口</text>
  <text class="t s" x="52" y="92">国勢調査の5歳階級×男女</text>
  <rect class="box" x="272" y="56" width="230" height="44"/>
  <text class="t h" x="288" y="76">5年刻みの出生数</text>
  <text class="t s" x="288" y="92">1950-2065年、実績+推計の概数</text>
  <rect class="box" x="518" y="56" width="226" height="44"/>
  <text class="t h" x="534" y="76">死亡モデル</text>
  <text class="t s" x="534" y="92">Gompertz近似+年次改善+男女差</text>

  <path class="arrow" d="M390 116 V146"/>

  <rect class="box" x="220" y="150" width="340" height="48"/>
  <text class="t h" x="236" y="171">projectSeries(model.ts)</text>
  <text class="t s" x="236" y="188">コーホート要因法で2070年まで前進計算(25時点)</text>

  <path class="arrow" d="M310 198 V214 H150 V238"/>
  <path class="arrow" d="M390 198 V238"/>
  <path class="arrow" d="M470 198 V214 H630 V238"/>

  <rect class="box" x="40" y="242" width="220" height="64"/>
  <text class="t h" x="56" y="264">interpolateSnapshot</text>
  <text class="t s" x="56" y="281">中間年の線形補間で</text>
  <text class="t s" x="56" y="296">アニメーションを滑らかにする</text>
  <rect class="box" x="280" y="242" width="220" height="64"/>
  <text class="t h" x="296" y="264">render.ts</text>
  <text class="t s" x="296" y="281">ピラミッドSVGを文字列生成</text>
  <text class="t s" x="296" y="296">コーホート強調・固定軸</text>
  <rect class="box" x="520" y="242" width="220" height="64"/>
  <text class="t h" x="536" y="264">stats.ts</text>
  <text class="t s" x="536" y="281">三区分割合・老年人口指数</text>
  <text class="t s" x="536" y="296">万人・パーセント表記</text>

  <path class="arrow" d="M150 306 V336"/>
  <path class="arrow" d="M390 306 V336"/>
  <path class="arrow" d="M630 306 V336"/>

  <rect class="zone" x="20" y="340" width="740" height="60"/>
  <text class="t zl" x="36" y="364">UI(main.ts / index.html)</text>
  <text class="t s" x="36" y="386">再生・年スライダー・速度切替・コーホートクリック追跡・指標パネル・テーマ切替・URLハッシュ共有(バーは差分更新)</text>
</svg>
